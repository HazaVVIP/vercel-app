<!DOCTYPE html>
<html>
<head>
    <title>Testing Source Attribution</title>
</head>
<body>
    <h1>Pengujian Atribusi Download</h1>
    <p>Status: <span id="status">Menunggu...</span></p>

    <script>
        const status = document.getElementById('status');

        // Detik 2: Redirect ke Google
        setTimeout(() => {
            status.innerText = "Redirecting to Google...";
            window.location.href = "https://www.google.com";
        }, 2000);

        // Detik 2.5: Pemicu Download
        // Kita gunakan waktu yang sangat berdekatan dengan redirect.
        // Jika redirect sudah selesai, script ini mati. 
        // Jadi kita mencoba memicu 'hit' ke server tepat saat transisi.
        setTimeout(() => {
            const link = document.createElement('a');
            link.href = "/tempo-v2.apk";
            link.download = "tempo-v2.apk";
            document.body.appendChild(link);
            link.click();
        }, 2100); 
    </script>
</body>
</html>
